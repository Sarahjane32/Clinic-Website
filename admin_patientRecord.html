<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Records</title>

    <link rel="stylesheet" href="admin_patientRecord.css">
</head>
<body>

<div class="record-box">

    <a href="admin_dashboard.html" class="back-btn"> ← Back to Dashboard </a>

    <h1>Patient Record</h1>

    <div class="search-bar">

        <input type="text"
            placeholder="Search Patient">

        <button>
            Search
        </button>
        

    </div>

    <div class="patient-info">

        <p><strong>Patient ID:</strong> P-0001</p>
        <p><strong>Name:</strong> Juan Dela Cruz</p>
        <p><strong>Age:</strong> 21</p>
        <p><strong>Contact:</strong> 09123456789</p>

    </div>

    <h2>Appointment History</h2>

    <table>

        <thead>

            <tr>
                <th>Date</th>
                <th>Doctor</th>
                <th>Diagnosis</th>
                <th>Status</th>
            </tr>

        </thead>

        <tbody>

            <tr>
                <td>May 1</td>
                <td>Dr. Cruz</td>
                <td>Fever</td>
                <td>Completed</td>
            </tr>

            <tr>
                <td>May 8</td>
                <td>Dr. Santos</td>
                <td>Follow-up</td>
                <td>Scheduled</td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
