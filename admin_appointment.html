<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointments</title>

<link rel="stylesheet" href="admin_appointment.css">
</head>

<body>

<div class="dashboard-container">

    <!--Side Bar-->
    <aside class="sidebar">

        <div>

            <div class="sidebar-top">

                <div class="profile-circle"></div>

                <div class="profile-name">
                    <h2 id="doctorName"></h2>
                    <p id="doctorRole"></p>
                </div>

            </div>

            <nav class="sidebar-menu">

                <a href="admin_dashboard.html"
                    class="menu-item"
                    onclick="closeDropdown()">

                    Dashboard

                </a>

                <!--Patient-->
                <div class="dropdown">

                    <button class="menu-item dropdown-btn"
                        onclick="toggleDropdown()">

                        Patients

                    </button>

                    <div class="dropdown-content"
                        id="patientDropdown">

                        <a href="admin_registerPatient.html"
                            class="dropdown-item">

                            Register Patient

                        </a>

                        <a href="admin_patientRecord.html"
                            class="dropdown-item">

                            Search Patient Records

                        </a>

                    </div>

                </div>

                <a href="admin_appointment.html"
                    class="menu-item active"
                    onclick="closeDropdown()">

                    Appointments

                </a>

                <a href="#"
                    class="menu-item"
                    onclick="closeDropdown()">

                    Doctors

                </a>

                <a href="#"
                    class="menu-item logout-btn"
                    onclick="closeDropdown()">

                    Logout

                </a>

            </nav>

        </div>

    </aside>

    <!--Main content---------------------------->
    <main class="main-content">

        <header class="topbar">

            <div class="topbar-left">

                <img src="logo.png"
                    class="clinic-logo">

                <div class="clinic-text">

                    <h1>ABC Clinic</h1>
                    <p>Clinic Appointment System</p>

                </div>

            </div>

            <div class="admin-box">
                Admin
            </div>

        </header>

        <!--Form-->
        <section class="appointment-card">

            <div class="section-header">
                Schedule Appointment
            </div>

            <div class="appointment-body">

                <input id="patientName" placeholder="Patient Name">

                <!--phone number-->
                <div class="phone-wrapper">

                    <input
                        id="phone"
                        type="text"
                        placeholder="Phone Number"
                        maxlength="11"
                    >

                    <small id="phoneError"
                        class="error-text"></small>

                </div>

                <!--Select Section-->
                <select id="sectionSelect">

                    <option value="">
                        Select Section
                    </option>

                    <option value="general">
                        General Medicine
                    </option>

                    <option value="pedia">
                        Pediatrics
                    </option>

                    <option value="dental">
                        Dental
                    </option>

                </select>

                <input id="date" type="date">

                <!--Doctor cards-->
                <div id="doctorContainer"
                    class="doctor-container"></div>

                <!--Time-->
                <select id="time">
                    <option>Select Time</option>
                </select>

                <input id="purpose"
                    placeholder="Purpose">

                <button class="confirm-btn"
                    onclick="showReceipt()">

                    Confirm Appointment

                </button>

            </div>

        </section>

    </main>

</div>

<!--Receipt-->
<div class="receipt-card" id="receiptCard">

    <div class="receipt-body">

        <button class="close-x"
            onclick="closeReceipt()">
            ✖
        </button>

        <div class="section-header">
            Clinic Appointment
        </div>

        <p>
            <strong>Appointment No:</strong>
            A-1023
        </p>

        <p>
            <strong>Patient:</strong>
            <span id="rName"></span>
        </p>

        <p>
            <strong>Phone:</strong>
            <span id="rPhone"></span>
        </p>

        <p>
            <strong>Doctor:</strong>
            <span id="rDoctor"></span>
        </p>

        <p>
            <strong>Date:</strong>
            <span id="rDate"></span>
        </p>

        <p>
            <strong>Time:</strong>
            <span id="rTime"></span>
        </p>

        <p>
            <strong>Purpose:</strong>
            <span id="rPurpose"></span>
        </p>

        <div class="notice">
            Please arrive 15 minutes before your appointment.
        </div>

        <button class="print-btn"
            onclick="printReceipt()">
            Print Receipt
        </button>

    </div>

</div>

<script>

const dropdown =
document.getElementById("patientDropdown");

/*Dropdownn*/
function toggleDropdown(){
    dropdown.classList.toggle("show");
}

/*for close drop*/
function closeDropdown(){
    localStorage.setItem(
        "patientDropdown",
        "closed"
    );
}

window.onload = function(){

    if(localStorage.getItem(
        "patientDropdown"
    ) === "open"){

        dropdown.classList.add("show");
    }
}

/*Doctor Data*/
const doctorData = {

    general: [

        {
            name:"Dr. Arcenal",
            sched:"Mon - Wed | 9AM - 11AM",
            times:[
                "9:00 AM",
                "10:00 AM",
                "11:00 AM"
            ]
        },

        {
            name:"Dr. Bayani",
            sched:"Tue - Thu | 1PM - 4PM",
            times:[
                "1:00 PM",
                "2:00 PM",
                "3:00 PM"
            ]
        }
    ],

    pedia: [

        {
            name:"Dr. Garduque",
            sched:"Mon - Fri | 8AM - 12PM",
            times:[
                "8:00 AM",
                "9:00 AM",
                "10:00 AM"
            ]
        },

        {
            name:"Dr. Macas",
            sched:"Tue - Sat | 2PM - 5PM",
            times:[
                "2:00 PM",
                "3:00 PM",
                "4:00 PM"
            ]
        }
    ],

    dental: [

        {
            name:"Dr. Taroy",
            sched:"Mon - Sat | 10AM - 1PM",
            times:[
                "10:00 AM",
                "11:00 AM",
                "12:00 PM"
            ]
        },

        {
            name:"Dr. Tomadong",
            sched:"Wed - Fri | 1PM - 5PM",
            times:[
                "1:00 PM",
                "2:00 PM",
                "3:00 PM"
            ]
        }

    ]
};

const sectionSelect =
document.getElementById("sectionSelect");

const doctorContainer =
document.getElementById("doctorContainer");

const timeSelect =
document.getElementById("time");

let selectedDoctor = "";

/*Phone Validation*/
const phoneInput =
document.getElementById("phone");

const phoneError =
document.getElementById("phoneError");

phoneInput.addEventListener(
    "input",
    function(){

    /*ito yung para di gumana yung letters sa phone*/
    this.value =
    this.value.replace(/[^0-9]/g,'');

    /*naka limit na 11 digits lang*/
    if(this.value.length > 11){

        this.value =
        this.value.slice(0,11);
    }

    /*for error messages*/
    if(this.value.length === 0){

        phoneError.innerText = "";

    }
    else if(this.value.length < 11){

        phoneError.innerText =
        "Phone number must be 11 digits.";

    }
    else{

        phoneError.innerText = "";
    }

});


sectionSelect.addEventListener(
"change",
function(){

    doctorContainer.innerHTML = "";

    timeSelect.innerHTML =
    "<option>Select Time</option>";

    selectedDoctor = "";

    const selectedSection =
    this.value;

    if(!doctorData[selectedSection])
    return;

    doctorData[selectedSection]
    .forEach(doc => {

        const card =
        document.createElement("div");

        card.classList.add("doctor-card");

        card.innerHTML = `

            <div class="doctor-top">

                <div class="doctor-pic"></div>

                <div class="doctor-name">
                    ${doc.name}
                </div>

            </div>

            <div class="doctor-sched">
                ${doc.sched}
            </div>

        `;

        card.onclick = function(){

            document
            .querySelectorAll(
                ".doctor-card"
            )
            .forEach(c =>
                c.classList.remove("active")
            );

            card.classList.add("active");

            selectedDoctor = doc.name;

            timeSelect.innerHTML = "";

            doc.times.forEach(t => {

                const option =
                document.createElement("option");

                option.text = t;

                timeSelect.appendChild(option);

            });

        };

        doctorContainer
        .appendChild(card);

    });

});

/*Receipt------------------------------------*/
function showReceipt(){

    const phone =
    document.getElementById("phone").value;

    /*for phone*/
    if(phone.length !== 11){

        phoneError.innerText =
        "Phone number must be exactly 11 digits.";

        return;
    }

    /*Doctor check*/
    if(selectedDoctor === ""){

        alert("Please select a doctor.");
        return;
    }

    document.getElementById("rName").innerText =
        document.getElementById("patientName").value;

    document.getElementById("rPhone").innerText =
        phone;

    document.getElementById("rDoctor").innerText =
        selectedDoctor;

    document.getElementById("rDate").innerText =
        document.getElementById("date").value;

    document.getElementById("rTime").innerText =
        document.getElementById("time").value;

    document.getElementById("rPurpose").innerText =
        document.getElementById("purpose").value;

    document.getElementById("receiptCard")
    .style.display = "flex";
}

function closeReceipt(){

    document.getElementById("receiptCard")
    .style.display = "none";
}

/*For print*/
function printReceipt(){
    window.print();
}


const name = localStorage.getItem("loggedInUser");
const role = localStorage.getItem("userRole");

/* SIDEBAR NAME */
document.getElementById("doctorName").innerHTML =
    "Ms. " + name;

/* SIDEBAR ROLE */
document.getElementById("doctorRole").innerHTML =
    role;


</script>

</body>
</html>
